<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Vivo India ATC — internal link dashboard" />
  <title>Vivo India ATC</title>
  <!-- Font Awesome (CDN) — solid icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    /* ========== Vivo India ATC — single-file dashboard styles ========== */
    :root {
      --bg-deep: #0a0e17;
      --bg-mid: #121a2b;
      --accent-1: #3b82f6;
      --accent-2: #8b5cf6;
      --accent-3: #06b6d4;
      --text: #e8edf7;
      --text-muted: #94a3b8;
      --glass-bg: rgba(18, 26, 43, 0.55);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.12);
      --radius: 14px;
      --radius-sm: 10px;
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.35);
      --shadow-hover: 0 16px 48px rgba(59, 130, 246, 0.15);
      --header-h: 72px;
      --font: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg-deep);
      background-image:
        radial-gradient(ellipse 120% 80% at 10% -20%, rgba(59, 130, 246, 0.25), transparent),
        radial-gradient(ellipse 100% 60% at 90% 100%, rgba(139, 92, 246, 0.2), transparent),
        linear-gradient(165deg, var(--bg-deep) 0%, var(--bg-mid) 45%, #0d1525 100%);
      background-attachment: fixed;
      line-height: 1.5;
    }

    /* ----- Loading overlay ----- */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      background: rgba(10, 14, 23, 0.92);
      backdrop-filter: blur(8px);
      transition: opacity var(--transition), visibility var(--transition);
    }
    #loading-overlay[hidden] {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .spinner {
      width: 52px;
      height: 52px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent-1);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: var(--text-muted);
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    /* ----- Error panel ----- */
    #error-panel {
      max-width: 520px;
      margin: 4rem auto;
      padding: 2rem;
      text-align: center;
      border-radius: var(--radius);
      background: var(--glass-bg);
      border: 1px solid rgba(239, 68, 68, 0.35);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow-soft);
    }
    #error-panel[hidden] { display: none !important; }
    #error-panel h2 { margin: 0 0 0.75rem; color: #fca5a5; font-size: 1.25rem; }
    #error-panel p { margin: 0 0 1.25rem; color: var(--text-muted); font-size: 0.95rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.65rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow var(--transition), background var(--transition);
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      color: #fff;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.35);
    }
    .btn-primary:hover {
      box-shadow: 0 6px 28px rgba(139, 92, 246, 0.4);
    }
    .btn-ghost {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid var(--glass-border);
    }
    .btn-ghost:hover { background: rgba(255, 255, 255, 0.12); }
    .btn-sm { padding: 0.45rem 0.85rem; font-size: 0.8rem; }

    /* ----- App shell ----- */
    #app[hidden] { display: none !important; }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.25rem 4rem;
    }

    /* ----- Sticky header ----- */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0.65rem 0;
      margin-bottom: 1.5rem;
      transition: box-shadow var(--transition), background var(--transition), border-color var(--transition);
    }
    .site-header.is-scrolled {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      border-bottom: 1px solid var(--glass-border);
    }
    .site-header-inner {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 0.85rem 1.25rem;
      border-radius: var(--radius);
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: inherit;
    }
    .brand-logo {
      width: 90px;
      height: 90px;
      object-fit: contain;
      object-position: center;
    }
    .brand-icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      font-size: 1.1rem;
      color: #fff;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
    }
    .brand-text h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-text span {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .header-tools {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: 0;
    }
    .search-wrap {
      flex: 1 1 200px;
      max-width: 360px;
      position: relative;
    }
    .search-wrap i {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.65rem 0.85rem 0.65rem 2.35rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .search-wrap input:focus {
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    .search-wrap input::placeholder { color: var(--text-muted); opacity: 0.8; }

    .menu-toggle {
      display: none;
      width: 44px;
      height: 44px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      cursor: pointer;
      transition: background var(--transition);
    }
    .menu-toggle:hover { background: rgba(255, 255, 255, 0.1); }

    /* ----- Mobile drawer ----- */
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--transition), visibility var(--transition);
    }
    .drawer-backdrop.is-open {
      opacity: 1;
      visibility: visible;
    }
    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 201;
      width: min(300px, 88vw);
      height: 100%;
      padding: 1.25rem;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      border-left: 1px solid var(--glass-border);
      transform: translateX(100%);
      transition: transform var(--transition);
      overflow-y: auto;
    }
    .drawer.is-open { transform: translateX(0); }
    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--glass-border);
    }
    .drawer-header span { font-weight: 700; font-size: 1rem; }
    .drawer-close {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      cursor: pointer;
    }
    .drawer-nav { display: flex; flex-direction: column; gap: 0.35rem; }
    .drawer-nav a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 0.75rem;
      border-radius: var(--radius-sm);
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      transition: background var(--transition);
    }
    .drawer-nav a:hover { background: rgba(59, 130, 246, 0.15); }
    .drawer-nav a i { width: 1.25rem; text-align: center; color: var(--accent-3); }

    /* ----- Recent panel ----- */
    .recent-panel {
      margin-bottom: 1.5rem;
      padding: 1rem 1.25rem;
      border-radius: var(--radius);
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-soft);
    }
    .recent-panel h2 {
      margin: 0 0 0.75rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .recent-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .recent-list:empty::after {
      content: "Open or copy a link to build your history.";
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .recent-list li a {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.65rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      text-decoration: none;
      font-size: 0.8rem;
      max-width: 100%;
      transition: background var(--transition), transform 0.15s ease;
    }
    .recent-list li a:hover { background: rgba(59, 130, 246, 0.2); }
    .recent-list li a span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }

    /* ----- Category sections ----- */
    .category-section {
      margin-bottom: 1.75rem;
      border-radius: var(--radius);
      background: var(--glass-bg);
      backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      transition: box-shadow var(--transition), opacity var(--transition);
    }
    .category-section.is-hidden-search { display: none; }

    .category-head {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      padding: 1rem 1.15rem;
      border-bottom: 1px solid var(--glass-border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent);
    }
    .category-head .cat-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 11px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.35), rgba(139, 92, 246, 0.25));
      font-size: 1.1rem;
      color: #93c5fd;
    }
    .category-head .cat-title {
      flex: 1;
      min-width: 0;
    }
    .category-head .cat-title h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(6, 182, 212, 0.2);
      color: #67e8f9;
      margin-top: 0.2rem;
    }
    .category-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .category-body {
      padding: 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.25s ease;
    }
    .category-section.is-collapsed .category-body {
      display: none;
    }

    /* ----- Link cards ----- */
    .link-card {
      padding: 1.1rem;
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid var(--glass-border);
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    }
    .link-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(59, 130, 246, 0.25);
    }
    .link-card.is-hidden { display: none !important; }

    .link-card-top {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      margin-bottom: 0.85rem;
    }
    .link-card-top .ext-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--accent-3);
      font-size: 0.95rem;
    }
    .link-card h3 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.35;
      color: #f1f5f9;
    }
    .link-card-actions {
      display: flex;
      gap: 0.5rem;
    }
    .link-card-actions .btn { flex: 1; }

    /* ----- Footer ----- */
    .site-footer {
      margin-top: 2rem;
      padding: 1.25rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--glass-border);
    }
    .site-footer strong { color: var(--text); }

    /* ----- Scroll to top ----- */
    #scroll-top {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 90;
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 1.1rem;
      color: #fff;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      box-shadow: 0 8px 28px rgba(59, 130, 246, 0.45);
      opacity: 0;
      visibility: hidden;
      transform: translateY(12px);
      transition: opacity var(--transition), visibility var(--transition), transform var(--transition);
    }
    #scroll-top.is-visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    #scroll-top:hover { transform: translateY(-2px); }

    /* ----- Toasts ----- */
    #toast-container {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      display: flex;
      flex-direction: column-reverse;
      gap: 0.5rem;
      max-width: min(420px, calc(100vw - 2rem));
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      padding: 0.75rem 1.1rem;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 500;
      box-shadow: var(--shadow-soft);
      animation: toastIn 0.35s ease;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .toast-success { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
    .toast-error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
    .toast-info { background: rgba(59, 130, 246, 0.2); color: #93c5fd; }

    /* ----- Responsive ----- */
    @media (max-width: 900px) {
      .menu-toggle { display: inline-flex; }
      .header-tools .search-wrap { flex: 1 1 100%; max-width: none; order: 3; }
    }
    @media (max-width: 600px) {
      .wrap { padding: 0 1rem 3rem; }
      .site-header-inner { padding: 0.75rem 1rem; }
      .brand-text h1 { font-size: 1rem; }
      .category-body { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Data loads from config.js (same folder); works with file:// and http(s). -->
  <div id="loading-overlay" role="status" aria-live="polite" aria-busy="true">
    <div class="spinner" aria-hidden="true"></div>
    <p class="loading-text">Loading dashboard…</p>
  </div>

  <div id="error-panel" hidden>
    <h2><i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i> Could not load data</h2>
    <p id="error-message">Unknown error.</p>
    <button type="button" class="btn btn-primary" id="retry-btn"><i class="fa-solid fa-rotate-right" aria-hidden="true"></i> Retry</button>
  </div>

  <div id="app" hidden>
    <header class="site-header" id="site-header">
      <div class="wrap">
        <div class="site-header-inner">
          <a class="brand" href="#" id="brand-link" aria-label="Home">
            <img src="logo.png" alt="Vivo Logo" class="brand-logo" />
            <!-- <span class="brand-icon" aria-hidden="true"><i class="fa-solid fa-layer-group"></i></span> -->
            <div class="brand-text">
              <h1 id="header-title">Vivo India ATC</h1>
              <span>Link hub</span>
            </div>
          </a>
          <button type="button" class="menu-toggle" id="menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="drawer">
            <i class="fa-solid fa-bars" aria-hidden="true"></i>
          </button>
          <div class="header-tools">
            <div class="search-wrap">
              <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
              <label for="search-input" class="visually-hidden">Search links</label>
              <input type="search" id="search-input" placeholder="Search links instantly…" autocomplete="off" />
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="drawer-backdrop" id="drawer-backdrop" hidden></div>
    <aside class="drawer" id="drawer" aria-hidden="true" role="dialog" aria-label="Section navigation">
      <div class="drawer-header">
        <span>Sections</span>
        <button type="button" class="drawer-close" id="drawer-close" aria-label="Close menu"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
      </div>
      <nav class="drawer-nav" id="drawer-nav"></nav>
    </aside>

    <main class="wrap" id="main-content"></main>

    <footer class="site-footer wrap">
      <p>&copy; <strong id="footer-year"></strong> Vivo India ATC · <span id="footer-updated"></span></p>
    </footer>

    <button type="button" id="scroll-top" aria-label="Scroll to top" title="Top">
      <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
    </button>
  </div>

  <div id="toast-container" aria-live="polite" aria-relevant="additions"></div>

  <style>
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>

  <script src="config.js"></script>
  <script>
    /**
     * Vivo India ATC — vanilla JS dashboard
     * Loads categories and links from window.__ATC_CONFIG__ (set by config.js).
     */
    (function () {
      'use strict';

      var RECENT_KEY = 'vivoIndiaAtcRecentLinks';
      var MAX_RECENT = 18;

      var els = {
        loading: document.getElementById('loading-overlay'),
        errorPanel: document.getElementById('error-panel'),
        errorMessage: document.getElementById('error-message'),
        retryBtn: document.getElementById('retry-btn'),
        app: document.getElementById('app'),
        header: document.getElementById('site-header'),
        headerTitle: document.getElementById('header-title'),
        main: document.getElementById('main-content'),
        search: document.getElementById('search-input'),
        drawer: document.getElementById('drawer'),
        drawerBackdrop: document.getElementById('drawer-backdrop'),
        drawerNav: document.getElementById('drawer-nav'),
        menuToggle: document.getElementById('menu-toggle'),
        drawerClose: document.getElementById('drawer-close'),
        scrollTop: document.getElementById('scroll-top'),
        footerYear: document.getElementById('footer-year'),
        footerUpdated: document.getElementById('footer-updated'),
        toastContainer: document.getElementById('toast-container'),
        brandLink: document.getElementById('brand-link')
      };

      var appData = null;
      var lastLoadTime = null;

      function slugify(name) {
        return String(name)
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-|-$/g, '') || 'section';
      }

      function iconClasses(icon) {
        var base = icon && String(icon).trim() ? String(icon).trim() : 'fa-link';
        if (base.indexOf('fa-') !== 0) base = 'fa-' + base;
        return 'fa-solid ' + base;
      }

      function validateConfig(data) {
        if (!data || typeof data !== 'object') return 'Invalid configuration root.';
        if (typeof data.title !== 'string' || !data.title.trim()) return 'Missing title.';
        if (!Array.isArray(data.categories)) return 'categories must be an array.';
        for (var i = 0; i < data.categories.length; i++) {
          var c = data.categories[i];
          if (!c || typeof c.name !== 'string') return 'Each category needs a name.';
          if (!Array.isArray(c.links)) return 'Category "' + c.name + '" needs a links array.';
          for (var j = 0; j < c.links.length; j++) {
            var L = c.links[j];
            if (!L || typeof L.title !== 'string' || typeof L.url !== 'string') {
              return 'Invalid link in category "' + c.name + '".';
            }
          }
        }
        return null;
      }

      function showToast(message, type) {
        type = type || 'info';
        var t = document.createElement('div');
        t.className = 'toast toast-' + type;
        t.setAttribute('role', 'status');
        t.textContent = message;
        els.toastContainer.appendChild(t);
        setTimeout(function () {
          t.style.opacity = '0';
          t.style.transform = 'translateY(8px)';
          t.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
          setTimeout(function () { t.remove(); }, 280);
        }, 3200);
      }

      function getRecents() {
        try {
          var raw = localStorage.getItem(RECENT_KEY);
          var list = raw ? JSON.parse(raw) : [];
          return Array.isArray(list) ? list : [];
        } catch (e) {
          return [];
        }
      }

      function saveRecents(list) {
        try {
          localStorage.setItem(RECENT_KEY, JSON.stringify(list));
        } catch (e) {
          showToast('Could not save recent links (storage full or disabled).', 'error');
        }
      }

      function recordRecent(title, url) {
        var list = getRecents().filter(function (x) { return x && x.url !== url; });
        list.unshift({ title: title, url: url, ts: Date.now() });
        if (list.length > MAX_RECENT) list = list.slice(0, MAX_RECENT);
        saveRecents(list);
        renderRecent();
      }

      function renderRecent() {
        var host = document.getElementById('recent-panel-list');
        if (!host) return;
        host.innerHTML = '';
        getRecents().forEach(function (item) {
          var li = document.createElement('li');
          var a = document.createElement('a');
          a.href = '#';
          a.innerHTML = '<i class="fa-solid fa-clock-rotate-left" aria-hidden="true"></i><span></span>';
          a.querySelector('span').textContent = item.title;
          a.addEventListener('click', function (e) {
            e.preventDefault();
            openLink(item.url, item.title);
          });
          li.appendChild(a);
          host.appendChild(li);
        });
      }

      function copyToClipboard(text) {
        if (navigator.clipboard && window.isSecureContext) {
          return navigator.clipboard.writeText(text).then(function () { return true; }).catch(function () { return fallbackCopy(text); });
        }
        return Promise.resolve(fallbackCopy(text));
      }

      function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        var ok = false;
        try {
          ok = document.execCommand('copy');
        } catch (e) {
          ok = false;
        }
        document.body.removeChild(ta);
        return ok;
      }

      function openLink(url, title) {
        window.open(url, '_blank');
        recordRecent(title, url);
      }

      function openAllLinks(links) {
        if (!links || !links.length) return;
        showToast('Opening ' + links.length + ' tab(s)… allow pop-ups if blocked.', 'info');
        links.forEach(function (link, i) {
          setTimeout(function () {
            window.open(link.url, '_blank');
          }, i * 100);
        });
      }

      function applySearch(query) {
        query = (query || '').trim().toLowerCase();
        var sections = els.main.querySelectorAll('.category-section');
        sections.forEach(function (sec) {
          var cards = sec.querySelectorAll('.link-card');
          var any = false;
          cards.forEach(function (card) {
            var hay = (card.getAttribute('data-search') || '').toLowerCase();
            var match = !query || hay.indexOf(query) !== -1;
            card.classList.toggle('is-hidden', !match);
            if (match) any = true;
          });
          sec.classList.toggle('is-hidden-search', !any && query.length > 0);
        });
      }

      function render(data) {
        appData = data;
        document.title = data.title;
        els.headerTitle.textContent = data.title;

        var html = '';

        html += '<section class="recent-panel" aria-labelledby="recent-heading">';
        html += '<h2 id="recent-heading"><i class="fa-solid fa-bolt" aria-hidden="true"></i> Recent</h2>';
        html += '<ul class="recent-list" id="recent-panel-list"></ul>';
        html += '</section>';

        data.categories.forEach(function (cat, idx) {
          var id = 'cat-' + slugify(cat.name) + '-' + idx;
          var icon = iconClasses(cat.icon);
          var count = cat.links.length;
          html += '<section class="category-section" id="' + id + '" data-category-name="' + escapeAttr(cat.name) + '">';
          html += '<div class="category-head">';
          html += '<div class="cat-icon" aria-hidden="true"><i class="' + icon + '"></i></div>';
          html += '<div class="cat-title"><h2>' + escapeHtml(cat.name) + '</h2><span class="badge">' + count + ' link' + (count !== 1 ? 's' : '') + '</span></div>';
          html += '<div class="category-actions">';
          html += '<button type="button" class="btn btn-ghost btn-sm btn-collapse" aria-expanded="true" aria-controls="' + id + '-body" data-cat-id="' + id + '"><i class="fa-solid fa-chevron-up" aria-hidden="true"></i> Collapse</button>';
          html += '<button type="button" class="btn btn-primary btn-sm btn-open-all" data-cat-idx="' + idx + '"><i class="fa-solid fa-up-right-from-square" aria-hidden="true"></i> Open all</button>';
          html += '</div></div>';
          html += '<div class="category-body" id="' + id + '-body">';
          cat.links.forEach(function (link) {
            var searchBlob = cat.name + ' ' + link.title + ' ' + link.url;
            html += '<article class="link-card" data-search="' + escapeAttr(searchBlob) + '" data-url="' + escapeAttr(link.url) + '" data-title="' + escapeAttr(link.title) + '">';
            html += '<div class="link-card-top">';
            html += '<span class="ext-icon" aria-hidden="true"><i class="fa-solid fa-up-right-from-square"></i></span>';
            html += '<h3>' + escapeHtml(link.title) + '</h3>';
            html += '</div>';
            html += '<div class="link-card-actions">';
            html += '<button type="button" class="btn btn-primary btn-open"><i class="fa-solid fa-up-right-from-square" aria-hidden="true"></i> Open</button>';
            html += '<button type="button" class="btn btn-ghost btn-copy"><i class="fa-solid fa-copy" aria-hidden="true"></i> Copy</button>';
            html += '</div></article>';
          });
          html += '</div></section>';
        });

        els.main.innerHTML = html;
        renderRecent();
        buildDrawerNav(data);
        applySearch(els.search.value);
      }

      function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function escapeAttr(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function buildDrawerNav(data) {
        els.drawerNav.innerHTML = '';
        data.categories.forEach(function (cat, idx) {
          var id = 'cat-' + slugify(cat.name) + '-' + idx;
          var a = document.createElement('a');
          a.href = '#' + id;
          var icon = iconClasses(cat.icon);
          a.innerHTML = '<i class="' + icon + '" aria-hidden="true"></i><span>' + escapeHtml(cat.name) + '</span>';
          a.addEventListener('click', function () {
            closeDrawer();
          });
          els.drawerNav.appendChild(a);
        });
      }

      function setLoading(isLoading) {
        if (isLoading) {
          els.loading.removeAttribute('hidden');
          els.loading.setAttribute('aria-busy', 'true');
        } else {
          els.loading.setAttribute('hidden', '');
          els.loading.setAttribute('aria-busy', 'false');
        }
      }

      function showError(msg) {
        els.errorMessage.textContent = msg;
        els.errorPanel.removeAttribute('hidden');
        els.app.setAttribute('hidden', '');
      }

      function hideError() {
        els.errorPanel.setAttribute('hidden', '');
      }

      function loadConfig() {
        setLoading(true);
        hideError();
        els.app.setAttribute('hidden', '');

        var raw = window.__ATC_CONFIG__;
        if (raw === undefined || raw === null) {
          setLoading(false);
          var missing =
            'Configuration not found. Place config.js next to index.html and ensure it sets window.__ATC_CONFIG__.';
          showError(missing);
          showToast('Config missing.', 'error');
          return Promise.resolve();
        }

        var data;
        try {
          data = JSON.parse(JSON.stringify(raw));
        } catch (copyErr) {
          setLoading(false);
          showError('Could not read configuration from window.__ATC_CONFIG__.');
          showToast('Invalid config data.', 'error');
          return Promise.resolve();
        }

        try {
          var err = validateConfig(data);
          if (err) throw new Error(err);
          lastLoadTime = new Date();
          setLoading(false);
          els.app.removeAttribute('hidden');
          render(data);
          els.footerYear.textContent = String(lastLoadTime.getFullYear());
          els.footerUpdated.textContent = 'Last updated: ' + lastLoadTime.toLocaleString();
        } catch (e) {
          setLoading(false);
          var msg = e && e.message ? e.message : 'Failed to load configuration.';
          showError(msg + ' Fix config.js and use Retry to reload.');
          showToast(msg, 'error');
        }
        return Promise.resolve();
      }

      function initHeaderScroll() {
        window.addEventListener(
          'scroll',
          function () {
            els.header.classList.toggle('is-scrolled', window.scrollY > 12);
          },
          { passive: true }
        );
      }

      function initScrollTop() {
        window.addEventListener(
          'scroll',
          function () {
            els.scrollTop.classList.toggle('is-visible', window.scrollY > 400);
          },
          { passive: true }
        );
        els.scrollTop.addEventListener('click', function () {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }

      function openDrawer() {
        els.drawerBackdrop.hidden = false;
        els.drawer.classList.add('is-open');
        els.drawerBackdrop.classList.add('is-open');
        els.drawer.setAttribute('aria-hidden', 'false');
        els.menuToggle.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
      }

      function closeDrawer() {
        els.drawer.classList.remove('is-open');
        els.drawerBackdrop.classList.remove('is-open');
        els.drawer.setAttribute('aria-hidden', 'true');
        els.menuToggle.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
        setTimeout(function () {
          if (!els.drawer.classList.contains('is-open')) els.drawerBackdrop.hidden = true;
        }, 300);
      }

      function initMobileNav() {
        els.menuToggle.addEventListener('click', function () {
          if (els.drawer.classList.contains('is-open')) closeDrawer();
          else openDrawer();
        });
        els.drawerClose.addEventListener('click', closeDrawer);
        els.drawerBackdrop.addEventListener('click', closeDrawer);
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') closeDrawer();
        });
      }

      function bindGlobalListeners() {
        els.retryBtn.addEventListener('click', function () {
          location.reload();
        });

        els.search.addEventListener('input', function () {
          applySearch(els.search.value);
        });

        els.brandLink.addEventListener('click', function (e) {
          e.preventDefault();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        els.main.addEventListener('click', function (e) {
          var t = e.target;
          if (t.closest('.btn-open')) {
            var card = t.closest('.link-card');
            if (!card) return;
            openLink(card.getAttribute('data-url'), card.getAttribute('data-title'));
          } else if (t.closest('.btn-copy')) {
            var card2 = t.closest('.link-card');
            if (!card2) return;
            var url = card2.getAttribute('data-url');
            var title = card2.getAttribute('data-title');
            copyToClipboard(url).then(function (ok) {
              if (ok) {
                showToast('Link copied to clipboard.', 'success');
                recordRecent(title, url);
              } else {
                showToast('Copy failed. Select the URL manually.', 'error');
              }
            });
          } else if (t.closest('.btn-open-all')) {
            var btn = t.closest('.btn-open-all');
            var idx = parseInt(btn.getAttribute('data-cat-idx'), 10);
            if (appData && appData.categories[idx]) {
              openAllLinks(appData.categories[idx].links);
            }
          } else if (t.closest('.btn-collapse')) {
            var b = t.closest('.btn-collapse');
            var cid = b.getAttribute('data-cat-id');
            var sec = document.getElementById(cid);
            if (!sec) return;
            var collapsed = sec.classList.toggle('is-collapsed');
            b.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
            var icon = b.querySelector('i');
            if (icon) {
              icon.className = collapsed ? 'fa-solid fa-chevron-down' : 'fa-solid fa-chevron-up';
            }
            b.innerHTML = (collapsed ? '<i class="fa-solid fa-chevron-down" aria-hidden="true"></i> Expand' : '<i class="fa-solid fa-chevron-up" aria-hidden="true"></i> Collapse');
          }
        });
      }

      initHeaderScroll();
      initScrollTop();
      initMobileNav();
      bindGlobalListeners();
      loadConfig();
    })();
  </script>
</body>
</html>
